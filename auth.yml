apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: flm
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: abbasshaik739/python:authimage
          ports:
            - containerPort: 5001

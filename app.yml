apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-service
  namespace: flm
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app-service
  template:
    metadata:
      labels:
        app: app-service
    spec:
      containers:
        - name: app-service
          image: abbasshaik739/python:appimage1
          ports:
            - containerPort: 5000

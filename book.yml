apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-service
  namespace: flm
spec:
  replicas: 3
  selector:
    matchLabels:
      app: book-service
  template:
    metadata:
      labels:
        app: book-service
    spec:
      containers:
        - name: book-service
          image: abbasshaik739/python:bookimage
          ports:
            - containerPort: 5002
